<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<title>Badges & chips</title>
<style>
  body { padding: 22px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .badge { font-family: 'Jost', sans-serif; font-weight: 600; font-size: 12px; padding: 5px 11px; border-radius: 999px; letter-spacing: 0.02em; }
  h4 { font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--neutral-400); margin-bottom: 6px; }
</style>
</head>
<body>
  <h4>Status</h4>
  <div class="row">
    <span class="badge" style="background:#E8EFB0; color:#3E4610">Świeże</span>
    <span class="badge" style="background:#FAD5C7; color:#7E220E">Nowość</span>
    <span class="badge" style="background:#231F20; color:#fff">Bestseller</span>
    <span class="badge" style="background:#C4EDE0; color:#094530">Dostarczono</span>
    <span class="badge" style="background:#E8E6E6; color:#635F60">Wkrótce</span>
  </div>
  <h4>Diety</h4>
  <div class="row">
    <span class="badge" style="background:#DDA79E; color:#231F20">Z Mięsem</span>
    <span class="badge" style="background:#BAD173; color:#231F20">Vege</span>
    <span class="badge" style="background:#71B783; color:#231F20">Vege+</span>
    <span class="badge" style="background:#93D0B4; color:#231F20">Wegan</span>
    <span class="badge" style="background:#F3ABCD; color:#231F20">Low IG</span>
    <span class="badge" style="background:#86D0CC; color:#231F20">Keto</span>
    <span class="badge" style="background:#F0ED6E; color:#231F20">Fit</span>
  </div>
  <h4>Kalorie</h4>
  <div class="row">
    <span class="badge" style="background:#fff; color:#231F20; border:1.5px solid #D2CFCF">1200 kcal</span>
    <span class="badge" style="background:#fff; color:#231F20; border:1.5px solid #D2CFCF">1500 kcal</span>
    <span class="badge" style="background:#231F20; color:#fff">1800 kcal ✓</span>
    <span class="badge" style="background:#fff; color:#231F20; border:1.5px solid #D2CFCF">2000 kcal</span>
  </div>
</body>
</html>
