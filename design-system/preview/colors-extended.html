<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<title>Extended palette</title>
<style>
  body { padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .c {
    border-radius: 12px;
    height: 90px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: var(--mr-black);
  }
  .c .n { font-family: var(--font-display); font-weight: 600; font-size: 11px; }
  .c .h { font-family: ui-monospace, Menlo, monospace; font-size: 9px; opacity: 0.75; }
  h3 { font-family: var(--font-display); font-weight: 600; font-size: 13px; margin-bottom: 10px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<h3>Rozszerzona paleta · 10 rodzin kotwic</h3>
<div class="grid">
  <div class="c" style="background:#F0ED6E"><div class="n">Żółty</div><div class="h">#F0ED6E</div></div>
  <div class="c" style="background:#86D0CC"><div class="n">Morski</div><div class="h">#86D0CC</div></div>
  <div class="c" style="background:#BAD173"><div class="n">Chartreuse</div><div class="h">#BAD173</div></div>
  <div class="c" style="background:#93D0B4"><div class="n">Szmaragdowy</div><div class="h">#93D0B4</div></div>
  <div class="c" style="background:#71B783"><div class="n">Trawiasty</div><div class="h">#71B783</div></div>
  <div class="c" style="background:#DDA79E"><div class="n">Łososiowy</div><div class="h">#DDA79E</div></div>
  <div class="c" style="background:#89C2F5"><div class="n">Niebieski</div><div class="h">#89C2F5</div></div>
  <div class="c" style="background:#F3ABCD"><div class="n">Różowy</div><div class="h">#F3ABCD</div></div>
  <div class="c" style="background:#E5C898"><div class="n">Piaskowy</div><div class="h">#E5C898</div></div>
  <div class="c" style="background:#B8E47E"><div class="n">Limonkowy</div><div class="h">#B8E47E</div></div>
</div>
</body>
</html>
