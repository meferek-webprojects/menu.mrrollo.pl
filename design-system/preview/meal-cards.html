<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<title>Meal card</title>
<style>
  body { padding: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card {
    border-radius: 20px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 6px 18px rgba(35,31,32,0.08);
    position: relative;
  }
  .card .hero { aspect-ratio: 16/10; overflow: hidden; position: relative; }
  .card .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tag {
    position: absolute; top: 12px; left: 12px;
    padding: 5px 10px;
    border-radius: 999px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .tag.vege { background: #BAD173; color: var(--mr-black); }
  .tag.keto { background: #86D0CC; color: var(--mr-black); }
  .body { padding: 14px 16px 16px; }
  .title { font-family: 'Jost', sans-serif; font-weight: 600; font-size: 17px; color: var(--mr-black); margin-bottom: 2px; }
  .sub { font-family: 'Open Sans', sans-serif; font-size: 12px; color: var(--neutral-500); margin-bottom: 10px; }
  .meta { display: flex; justify-content: space-between; align-items: center; }
  .kcal { font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 600; color: var(--mr-black); }
  .fav { width: 28px; height: 28px; border-radius: 50%; background: var(--neutral-50); display: flex; align-items: center; justify-content: center; color: var(--neutral-500); font-size: 14px; }
</style>
</head>
<body>
  <div class="card">
    <div class="hero">
      <img src="../assets/photos/pasta-salmon.jpg">
      <span class="tag vege">Vege+</span>
    </div>
    <div class="body">
      <div class="title">Tagliatelle z łososiem</div>
      <div class="sub">Obiad · środa</div>
      <div class="meta"><span class="kcal">580 kcal</span><span class="fav">♡</span></div>
    </div>
  </div>
  <div class="card">
    <div class="hero">
      <img src="../assets/photos/oatmeal-pumpkin.jpg">
      <span class="tag keto">Keto</span>
    </div>
    <div class="body">
      <div class="title">Owsianka z dynią</div>
      <div class="sub">Śniadanie · poniedziałek</div>
      <div class="meta"><span class="kcal">420 kcal</span><span class="fav">♡</span></div>
    </div>
  </div>
</body>
</html>
