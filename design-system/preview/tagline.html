<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<title>Tagline treatment</title>
<style>
  body { padding: 0; height: 300px; background: var(--mr-green); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; position: relative; overflow: hidden; }
  .logo { width: 120px; height: 120px; display: block; }
  .big {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 72px;
    line-height: 0.95;
    color: var(--mr-black);
    text-align: center;
  }
  .meta { position: absolute; bottom: 16px; right: 22px; font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mr-black); opacity: 0.65; }
</style>
</head>
<body>
  <img class="logo" src="../assets/logos/mr-rollo-black.png">
  <div class="big">Naturalnie dla Ciebie.</div>
  <div class="meta">Hasło marki · 2007 — 2026</div>
</body>
</html>
