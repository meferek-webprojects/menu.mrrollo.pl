<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Mr. Rollo — Naturalnie dla Ciebie</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; color: var(--mr-black); font-family: var(--font-body); }
  * { box-sizing: border-box; }
  button:hover { filter: brightness(0.98); }
  button:active { transform: scale(0.98); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [diet, setDiet] = useState('Vege');
  const [cart, setCart] = useState(3);
  const [nav, setNav] = useState('Menu');
  return (
    <div>
      <Header active={nav} onNav={setNav} cartCount={cart} onCart={() => setCart(cart + 1)} />
      <HeroSection />
      <DietsSection active={diet} setActive={setDiet} />
      <MenuSection />
      <HowItWorks />
      <CtaSection />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
