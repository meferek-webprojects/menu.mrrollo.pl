<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu Generator · Mr. Rollo</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:  #C6D359;
    --orange: #EF522D;
    --black:  #231F20;
    --bg:     #141412;
    --surface: #1d1d1a;
    --border:  #2a2a26;
    --text:    #e8e8e2;
    --muted:   #666660;
    --dimmed:  #3a3a34;
  }

  body {
    font-family: 'Jost', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap');

  /* ── HEADER ── */
  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
  }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  header span { font-size: 12px; color: var(--muted); letter-spacing: 0.02em; }

  /* ── LAYOUT ── */
  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 0;
  }

  /* ── LEFT ── */
  .left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .section-label {
    padding: 14px 20px 10px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  /* ── DROP ZONE ── */
  .drop-zone {
    margin: 16px;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    flex-shrink: 0;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--green);
    background: rgba(198, 211, 89, 0.04);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-zone .dz-icon { font-size: 28px; margin-bottom: 8px; }
  .drop-zone p { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .drop-zone p strong { color: var(--green); }

  /* ── SHEETS LIST ── */
  .sheets-container {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sheet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .sheet-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
  }
  .sheet-header:hover { background: rgba(255,255,255,0.02); }

  .sheet-status {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sheet-status.ok   { background: var(--green); }
  .sheet-status.warn { background: var(--orange); }
  .sheet-status.none { background: var(--dimmed); }

  .sheet-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sheet-count {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .sheet-chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .sheet-card.open .sheet-chevron { transform: rotate(90deg); }

  .sheet-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    flex-direction: column;
    gap: 10px;
  }
  .sheet-card.open .sheet-body { display: flex; }

  .field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field-row label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .field-row select, .field-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 6px 10px;
    width: 100%;
    font-family: inherit;
    outline: none;
  }
  .field-row select:focus, .field-row input:focus {
    border-color: var(--green);
  }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .sheet-remove {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    align-self: flex-start;
    transition: border-color 0.1s, color 0.1s;
    font-family: inherit;
  }
  .sheet-remove:hover { border-color: var(--orange); color: var(--orange); }

  /* ── BOTTOM BAR (left) ── */
  .left-footer {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 7px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.1s, color 0.1s;
  }
  .btn-clear:hover { border-color: var(--orange); color: var(--orange); }

  /* ── RIGHT ── */
  .right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .right-top {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .right-top h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
    flex: 1;
  }

  .stats-row {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }

  .btn-copy, .btn-download {
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .btn-download {
    background: var(--green);
    color: var(--black);
  }
  .btn-download:hover { background: #d4e06a; }
  .btn-download:disabled { background: var(--dimmed); color: var(--muted); cursor: default; }
  .btn-download.copied { background: #5caf70; color: #fff; }

  .btn-copy {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-copy:hover { border-color: var(--green); }
  .btn-copy:disabled { color: var(--muted); cursor: default; }

  .output-wrap {
    flex: 1;
    overflow: auto;
    padding: 20px 24px;
  }

  .output {
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 11.5px;
    line-height: 1.75;
    color: #b0b09a;
    white-space: pre;
    min-height: 100%;
  }
  .output.empty {
    font-family: inherit;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    text-align: center;
  }

  /* JSON syntax highlight */
  .j-key    { color: #8ec07c; }
  .j-str    { color: #b8bb26; }
  .j-num    { color: #d3869b; }
  .j-bool   { color: #fabd2f; }
  .j-null   { color: #fb4934; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--green);
    color: var(--black);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dimmed); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>Menu Generator · Mr. Rollo</h1>
  </div>
  <span>Wrzuć .xlsm / .xlsx → pobierz menu.json</span>
</header>

<div class="workspace">

  <!-- ── LEFT ── -->
  <div class="left">
    <div class="section-label">Plik źródłowy</div>

    <div class="drop-zone" id="dropZone"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event)">
      <input type="file" id="fileInput" accept=".xlsx,.xlsm" onchange="onFileInput(event)" />
      <div class="dz-icon">📂</div>
      <p>Wrzuć <strong>KATALOG_PRODUKTÓW.xlsm</strong><br/>lub kliknij, żeby wybrać</p>
    </div>

    <div class="section-label" id="sheetsLabel" style="display:none">Arkusze</div>
    <div class="sheets-container" id="sheetsList"></div>

    <div class="left-footer" id="leftFooter" style="display:none">
      <button class="btn-clear" onclick="clearAll()">✕ Wyczyść</button>
    </div>
  </div>

  <!-- ── RIGHT ── -->
  <div class="right">
    <div class="right-top">
      <h2>menu.json</h2>
      <div class="stats-row" id="statsRow" style="display:none">
        <div class="stat"><div class="stat-dot" style="background:var(--green)"></div><span id="statItems">0 pozycji</span></div>
        <div class="stat"><div class="stat-dot" style="background:var(--orange)"></div><span id="statCats">0 kategorii</span></div>
        <div class="stat"><div class="stat-dot" style="background:#89C2F5"></div><span id="statPhotos">0 ze zdjęciem</span></div>
      </div>
      <button class="btn-copy" id="btnCopy" onclick="copyJSON()" disabled>Kopiuj</button>
      <button class="btn-download" id="btnDownload" onclick="downloadJSON()" disabled>Pobierz JSON</button>
    </div>
    <div class="output-wrap">
      <div class="output empty" id="output">Tu pojawi się wygenerowany menu.json</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let state = {
  workbook: null,
  filename: '',
  sheets: []  // { sheetName, categoryId, categoryName, dietCol, photoCol, priceCol, items[] }
};

// Default category mapping by sheet name
const DEFAULT_CATS = {
  'Sałatki':       { id: 'salatki',  name: 'Sałatki'  },
  'Kanapki':       { id: 'kanapki',  name: 'Kanapki'  },
  'Zupy':          { id: 'zupy',     name: 'Zupy'     },
  'Obiady':        { id: 'obiady',   name: 'Obiady'   },
  'Desery':        { id: 'desery',   name: 'Desery'   },
  'soki i napoje': { id: 'soki',     name: 'Soki'     },
  'Sushi':         { id: 'sushi',    name: 'Sushi'    },
};

// ─────────────────────────────────────────────
// File input
// ─────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDragLeave() { document.getElementById('dropZone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.xlsx') || f.name.endsWith('.xlsm'));
  if (file) processFile(file);
}
function onFileInput(e) { if (e.target.files[0]) processFile(e.target.files[0]); }

async function processFile(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  state.workbook = wb;
  state.filename = file.name;

  state.sheets = wb.SheetNames
    .filter(n => n !== 'Katalog')
    .map(sheetName => {
      const sheet = wb.Sheets[sheetName];
      const rows  = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      const { headerRow, headerIdx, cols } = findHeader(rows);
      const items = headerRow !== -1 ? parseItems(rows, headerRow, cols, sheetName) : [];
      const def   = DEFAULT_CATS[sheetName] || { id: slugify(sheetName), name: sheetName };
      return {
        sheetName,
        categoryId:   def.id,
        categoryName: def.name,
        cols,          // column index map
        items,
        enabled: true,
        open: false,
      };
    });

  renderSheets();
  renderJSON();
}

// ─────────────────────────────────────────────
// Header detection
// ─────────────────────────────────────────────
function findHeader(rows) {
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const vals = rows[i].map(v => String(v).trim());
    if (vals.includes('Symbol') && vals.includes('Nazwa')) {
      const cols = {};
      vals.forEach((v, idx) => { cols[v] = idx; });
      return { headerRow: i, cols };
    }
  }
  return { headerRow: -1, cols: {} };
}

// ─────────────────────────────────────────────
// Parse rows
// ─────────────────────────────────────────────
function parseItems(rows, headerRow, cols, sheetName) {
  const symIdx   = findColIdx(cols, ['Symbol']);
  const nameIdx  = findColIdx(cols, ['Nazwa']);
  const photoIdx = findColIdx(cols, ['ZDJĘCIA', 'Zdjęcie', 'Zdjecia']);
  const priceIdx = findColIdx(cols, ['Cena', 'CENA']);
  const dietIdx  = findColIdx(cols, ['Dieta']);

  const items = [];
  for (let i = headerRow + 1; i < rows.length; i++) {
    const row = rows[i];
    const sym = String(row[symIdx] ?? '').trim();
    if (!sym || sym === 'nan') continue;
    const name = String(row[nameIdx] ?? '').trim();
    if (!name || name === 'nan') continue;

    // Skip archiwum
    const allVals = row.map(v => String(v).toUpperCase());
    if (allVals.some(v => v === 'ARCHIWUM')) continue;

    const rawId = sym.endsWith('.0') ? sym.slice(0, -2) : sym;

    const photoRaw = String(row[photoIdx] ?? '').trim();
    const hasPhoto = photoRaw.includes('✅');

    const dietRaw  = dietIdx !== -1 ? String(row[dietIdx] ?? '').trim() : '';
    const diet     = (dietRaw && dietRaw !== 'nan') ? dietRaw : null;

    const priceRaw = row[priceIdx];
    let price = null;
    if (priceRaw !== '' && priceRaw !== null && !isNaN(Number(priceRaw))) {
      price = parseInt(priceRaw, 10);
    }

    let isNew = false;
    try { isNew = parseFloat(rawId.replace(/[A-Za-z]/g, '')) >= 1900; } catch {}

    items.push({ id: rawId, name, diet, hasPhoto, price, new: isNew });
  }
  return items;
}

function findColIdx(cols, keys) {
  for (const k of keys) {
    if (k in cols) return cols[k];
    // fuzzy
    const match = Object.keys(cols).find(c => c.toUpperCase().includes(k.toUpperCase()));
    if (match) return cols[match];
  }
  return -1;
}

// ─────────────────────────────────────────────
// Render sheet cards
// ─────────────────────────────────────────────
function renderSheets() {
  const list  = document.getElementById('sheetsList');
  const label = document.getElementById('sheetsLabel');
  const footer = document.getElementById('leftFooter');

  list.innerHTML = '';
  label.style.display  = state.sheets.length ? '' : 'none';
  footer.style.display = state.sheets.length ? '' : 'none';

  state.sheets.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'sheet-card' + (s.open ? ' open' : '');
    card.innerHTML = `
      <div class="sheet-header" onclick="toggleCard(${i})">
        <div class="sheet-status ${s.enabled ? (s.items.length > 0 ? 'ok' : 'warn') : 'none'}"></div>
        <span class="sheet-name">${s.sheetName}</span>
        <span class="sheet-count">${s.items.length} poz.</span>
        <span class="sheet-chevron">▶</span>
      </div>
      <div class="sheet-body">
        <div class="fields-grid">
          <div class="field-row">
            <label>ID kategorii</label>
            <input type="text" value="${s.categoryId}" oninput="updateField(${i},'categoryId',this.value); renderJSON()" />
          </div>
          <div class="field-row">
            <label>Nazwa kategorii</label>
            <input type="text" value="${s.categoryName}" oninput="updateField(${i},'categoryName',this.value); renderJSON()" />
          </div>
        </div>
        <div class="field-row">
          <label>Uwzględnij w JSON</label>
          <select onchange="updateField(${i},'enabled',this.value==='true'); renderJSON()">
            <option value="true" ${s.enabled ? 'selected' : ''}>✅ Tak</option>
            <option value="false" ${!s.enabled ? 'selected' : ''}>— Pomiń</option>
          </select>
        </div>
        <button class="sheet-remove" onclick="removeSheet(${i})">Usuń arkusz</button>
      </div>`;
    list.appendChild(card);
  });
}

function toggleCard(i) {
  state.sheets[i].open = !state.sheets[i].open;
  renderSheets();
}
function updateField(i, key, val) {
  state.sheets[i][key] = val;
}
function removeSheet(i) {
  state.sheets.splice(i, 1);
  renderSheets();
  renderJSON();
}

// ─────────────────────────────────────────────
// Build & render JSON
// ─────────────────────────────────────────────
function buildJSON() {
  const enabled = state.sheets.filter(s => s.enabled && s.items.length > 0);
  if (!enabled.length) return null;

  const categories = enabled.map(s => ({ id: s.categoryId, name: s.categoryName }));
  const items = enabled.flatMap(s =>
    s.items.map(item => ({
      id:       item.id,
      category: s.categoryId,
      name:     item.name,
      diet:     item.diet,
      hasPhoto: item.hasPhoto,
      price:    item.price,
      new:      item.new,
    }))
  );
  return { categories, items };
}

function renderJSON() {
  const obj = buildJSON();
  const out = document.getElementById('output');
  const btnC = document.getElementById('btnCopy');
  const btnD = document.getElementById('btnDownload');
  const statsRow = document.getElementById('statsRow');

  if (!obj) {
    out.className = 'output empty';
    out.innerHTML = state.sheets.length
      ? 'Żaden arkusz nie ma pozycji lub wszystkie są wyłączone'
      : 'Tu pojawi się wygenerowany menu.json';
    btnC.disabled = btnD.disabled = true;
    statsRow.style.display = 'none';
    return;
  }

  const raw = JSON.stringify(obj, null, 2);
  out.className = 'output';
  out.innerHTML = syntaxHL(raw);
  btnC.disabled = btnD.disabled = false;

  // stats
  statsRow.style.display = '';
  document.getElementById('statItems').textContent  = obj.items.length + ' pozycji';
  document.getElementById('statCats').textContent   = obj.categories.length + ' kategorii';
  const withPhoto = obj.items.filter(i => i.hasPhoto).length;
  document.getElementById('statPhotos').textContent = withPhoto + ' ze zdjęciem';
}

function syntaxHL(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
      if (/^"/.test(m)) {
        return /:$/.test(m)
          ? `<span class="j-key">${m}</span>`
          : `<span class="j-str">${m}</span>`;
      }
      if (/true|false/.test(m)) return `<span class="j-bool">${m}</span>`;
      if (/null/.test(m))       return `<span class="j-null">${m}</span>`;
      return `<span class="j-num">${m}</span>`;
    });
}

// ─────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────
function copyJSON() {
  const obj = buildJSON();
  if (!obj) return;
  navigator.clipboard.writeText(JSON.stringify(obj, null, 2)).then(() => showToast('Skopiowano!'));
}

function downloadJSON() {
  const obj = buildJSON();
  if (!obj) return;
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'menu.json';
  a.click();
  showToast('Pobrano menu.json');
}

function clearAll() {
  state = { workbook: null, filename: '', sheets: [] };
  document.getElementById('fileInput').value = '';
  document.getElementById('dropZone').querySelector('p').innerHTML =
    'Wrzuć <strong>KATALOG_PRODUKTÓW.xlsm</strong><br/>lub kliknij, żeby wybrać';
  renderSheets();
  renderJSON();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g,'');
}
</script>

</body>
</html>
