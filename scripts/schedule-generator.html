<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schedule Generator · Mr. Rollo</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #1a1a1a;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid #2e2e2e;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; }
  header span { font-size: 13px; color: #666; }

  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  /* ── LEFT PANEL ── */
  .left {
    padding: 24px 28px;
    border-right: 1px solid #2e2e2e;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .drop-zone {
    border: 2px dashed #3a3a3a;
    border-radius: 16px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #c6d359;
    background: rgba(198, 211, 89, 0.05);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-zone .icon { font-size: 32px; margin-bottom: 10px; }
  .drop-zone p { font-size: 14px; color: #888; line-height: 1.5; }
  .drop-zone p strong { color: #c6d359; }

  .file-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-item {
    background: #242424;
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .file-item .date-pill {
    background: #c6d359;
    color: #1a1a1a;
    font-weight: 700;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .file-item .date-pill.err {
    background: #e05c5c;
    color: #fff;
  }
  .file-item .fname {
    color: #aaa;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .file-item .count {
    color: #555;
    font-size: 11px;
    flex-shrink: 0;
  }
  .file-item .remove {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 16px;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.1s;
  }
  .file-item .remove:hover { color: #e05c5c; }

  .btn-clear {
    background: none;
    border: 1px solid #333;
    color: #666;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    align-self: flex-start;
    transition: border-color 0.1s, color 0.1s;
  }
  .btn-clear:hover { border-color: #e05c5c; color: #e05c5c; }

  /* ── RIGHT PANEL ── */
  .right {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .right-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .right-header h2 { font-size: 14px; font-weight: 600; color: #888; }

  .btn-copy {
    background: #c6d359;
    color: #1a1a1a;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-copy:hover { background: #d4e06a; }
  .btn-copy:disabled { background: #2e2e2e; color: #555; cursor: default; }
  .btn-copy.copied { background: #4caf50; color: #fff; }

  .output {
    flex: 1;
    background: #0f0f0f;
    border-radius: 12px;
    padding: 18px;
    font-family: "Menlo", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #c8c8c8;
    overflow: auto;
    white-space: pre;
    min-height: 400px;
    border: 1px solid #2a2a2a;
  }

  .output.empty { color: #444; font-family: system-ui, sans-serif; font-size: 13px; display: flex; align-items: center; justify-content: center; }

  .merge-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #666;
  }
  .merge-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .merge-row input[type="checkbox"] { accent-color: #c6d359; width: 14px; height: 14px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Schedule Generator · Mr. Rollo</h1>
    <span>Wrzuć pliki .xlsx → skopiuj schedule.json</span>
  </div>
</header>

<div class="workspace">
  <!-- LEFT -->
  <div class="left">
    <div
      class="drop-zone"
      id="dropZone"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event)"
    >
      <input type="file" id="fileInput" accept=".xlsx" multiple onchange="onFileInput(event)" />
      <div class="icon">📂</div>
      <p>Przeciągnij pliki <strong>.xlsx</strong> tutaj<br/>lub kliknij, żeby wybrać</p>
    </div>

    <div class="file-list" id="fileList"></div>

    <button class="btn-clear" id="btnClear" onclick="clearAll()" style="display:none">
      Wyczyść wszystko
    </button>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-header">
      <h2>schedule.json</h2>
      <button class="btn-copy" id="btnCopy" onclick="copyJSON()" disabled>Kopiuj JSON</button>
    </div>
    <div class="output empty" id="output">Tu pojawi się wygenerowany JSON</div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  // entries: Array<{ file: File, iso: string|null, ids: string[] }>
  const entries = [];

  // ── Date extraction ────────────────────────────────────────────────────────
  // Matches DD.MM.YYYY anywhere in the filename
  const DATE_RE = /(\d{2})\.(\d{2})\.(\d{4})/;

  function parseISODate(filename) {
    const m = filename.match(DATE_RE);
    if (!m) return null;
    const [, dd, mm, yyyy] = m;
    return `${yyyy}-${mm}-${dd}`;
  }

  // ── XLSX parsing ───────────────────────────────────────────────────────────
  function extractIDs(arrayBuffer) {
    const workbook = XLSX.read(arrayBuffer, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
    const ids = [];
    for (const row of rows) {
      const raw = row[0];
      if (raw === "" || raw === null || raw === undefined) continue;
      const id = String(raw).trim();
      if (id) ids.push(id);
    }
    return ids;
  }

  // ── File processing ────────────────────────────────────────────────────────
  async function processFiles(files) {
    for (const file of files) {
      // Skip duplicates
      if (entries.some((e) => e.file.name === file.name && e.file.size === file.size)) continue;

      const iso = parseISODate(file.name);
      const buf = await file.arrayBuffer();
      const ids = extractIDs(buf);
      entries.push({ file, iso, ids });
    }

    // Sort by iso date (nulls last)
    entries.sort((a, b) => {
      if (!a.iso && !b.iso) return 0;
      if (!a.iso) return 1;
      if (!b.iso) return -1;
      return a.iso.localeCompare(b.iso);
    });

    render();
  }

  // ── Render file list ───────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById("fileList");
    list.innerHTML = "";

    for (let i = 0; i < entries.length; i++) {
      const { file, iso, ids } = entries[i];

      const item = document.createElement("div");
      item.className = "file-item";

      const pill = document.createElement("span");
      pill.className = iso ? "date-pill" : "date-pill err";
      pill.textContent = iso ?? "brak daty";
      item.appendChild(pill);

      const fname = document.createElement("span");
      fname.className = "fname";
      fname.title = file.name;
      fname.textContent = file.name;
      item.appendChild(fname);

      const count = document.createElement("span");
      count.className = "count";
      count.textContent = `${ids.length} ID`;
      item.appendChild(count);

      const btn = document.createElement("button");
      btn.className = "remove";
      btn.textContent = "×";
      btn.title = "Usuń";
      btn.onclick = () => { entries.splice(i, 1); render(); };
      item.appendChild(btn);

      list.appendChild(item);
    }

    document.getElementById("btnClear").style.display = entries.length ? "" : "none";
    renderJSON();
  }

  // ── Render JSON output ─────────────────────────────────────────────────────
  function renderJSON() {
    const out = document.getElementById("output");
    const btn = document.getElementById("btnCopy");

    const valid = entries.filter((e) => e.iso);
    if (valid.length === 0) {
      out.className = "output empty";
      out.textContent = entries.length
        ? "Żaden plik nie ma daty w nazwie (DD.MM.RRRR)"
        : "Tu pojawi się wygenerowany JSON";
      btn.disabled = true;
      return;
    }

    const obj = {};
    for (const { iso, ids } of valid) {
      obj[iso] = ids;
    }

    out.className = "output";
    out.textContent = JSON.stringify(obj, null, 2);
    btn.disabled = false;
  }

  // ── Copy ──────────────────────────────────────────────────────────────────
  function copyJSON() {
    const text = document.getElementById("output").textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("btnCopy");
      btn.textContent = "Skopiowano!";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "Kopiuj JSON";
        btn.classList.remove("copied");
      }, 2000);
    });
  }

  // ── Clear ─────────────────────────────────────────────────────────────────
  function clearAll() {
    entries.length = 0;
    document.getElementById("fileInput").value = "";
    render();
  }

  // ── Drag & drop ───────────────────────────────────────────────────────────
  function onDragOver(e) {
    e.preventDefault();
    document.getElementById("dropZone").classList.add("drag-over");
  }
  function onDragLeave(e) {
    document.getElementById("dropZone").classList.remove("drag-over");
  }
  function onDrop(e) {
    e.preventDefault();
    document.getElementById("dropZone").classList.remove("drag-over");
    const files = [...e.dataTransfer.files].filter((f) => f.name.endsWith(".xlsx"));
    if (files.length) processFiles(files);
  }
  function onFileInput(e) {
    processFiles([...e.target.files]);
  }
</script>

</body>
</html>
